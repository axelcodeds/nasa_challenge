<!DOCTYPE html>
<html lang="es">


<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> 
    <title>Clima Chilpancingo | UV y Calidad del Aire</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <link rel="stylesheet" href="style.css">

</head>

<body class="gradient-bg min-h-screen font-sans">
   

    <!-- Enhanced Sun in top right corner -->
    <div class="sun-container">
        <div class="sun-glow"></div>
        <div class="scaler">
            <div class="sun-rays"></div>
        </div>
        <div class="sun-core" id="animated-sun"></div>
        <div class="sun-flares" id="sun-flares"></div>
    </div>

    <!-- UV warming effect -->
    <div class="uv-warming" id="uv-warming"></div>

    <!-- Contenedor de animación de viento -->
    <div id="wind-container" class="wind-animation"></div>

    <div class="container mx-auto px-4 py-2">
        <!-- Header -->
        <header class="text-center mb-8" data-aos="fade-down" >           
            
            <h1 class="text-4xl font-bold text-white text-contrast mb-2">Guerrero</h1>
            <p class="text-lg text-white text-contrast">Monitoreo de radiación UV y calidad del aire</p>
       
        </header>

        <!-- Main Content -->
        <div class="flex flex-col md:flex-row">
            <!-- Left Side - Space for Map -->
          
            <div class="w-full md:w-1/2 p-4" id="map"> 
            </div>   <div id="cloud-container" class="cloud-container">easd</div>

            <!-- Right Side - Weather Data -->
            <div class=" w-full md:w-1/2 p-4">
               
                <div class="space-y-6">
                    <!-- Contenedor de la info UV-->
                    <div class="card-contrast rounded-xl p-6" data-aos="fade-left">
                        <div class="flex items-center mb-4">
                            <i data-feather="sun" class="text-yellow-500 mr-3"></i>
                            <h2 class="text-lg font-semibold text-white text-contrast">Índice UV</h2>
                        </div>

                        <div class="flex items-center justify-between mb-6">
                            <div class="text-4xl font-bold text-white text-contrast" id="uv-value">--</div>
                            <div class="px-4 py-2 rounded-full text-white font-medium" id="uv-level">Cargando...</div>
                        </div>
                        <div class="bg-white/30 rounded-full h-2.5">
                            <div class="h-2.5 rounded-full" id="uv-meter"></div>
                        </div>
                        <div class="flex justify-between text-xs text-white mt-1 text-contrast">
                            <span>0</span>
                            <span>3</span>
                            <span>6</span>
                            <span>8</span>
                            <span>11+</span>
                        </div>
                    </div>

                    <!-- Carta de calidad de aire -->
                    <div class="card-contrast rounded-xl p-6" data-aos="fade-left">
                        <div class="flex items-center mb-4">
                            <i data-feather="wind" class="text-blue-300 mr-3"></i>
                            <h2 class="text-lg font-semibold text-white text-contrast">Calidad del Aire</h2>
                        </div>

                        <div class="flex items-center justify-between mb-6">
                            <div class="text-4xl font-bold text-white text-contrast" id="air-value">--</div>
                            <div class="px-4 py-2 rounded-full text-white font-medium" id="air-level">Cargando...</div>
                        </div>

                        <div class="bg-white/30 rounded-full h-2.5">
                            <div class="h-2.5 rounded-full" id="air-meter"></div>
                        </div>
                        <div class="flex justify-between text-xs text-white mt-1 text-contrast">
                            <span>Buena</span>
                            <span>Moderada</span>
                            <span>Dañina</span>
                            <span>Muy dañina</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
      
        <footer>
            <div class="text-center text-white text-sm mt-8 mb-4">
                &copy; 2025 Clima Chilpancingo..
                <!-- Carta de calidad de aire -->
                <p>Desarrollado por:
                Axel Diego Soto
                Cesar Barrera López
                Adalberto Cisca Pinzón
                Jose Felipe Morales López</p>

            </div>
        </footer>
    </div>



    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

    <script src="script.js"></script>
</body>

</html>
